services:
  api:
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      ENVIRONMENT: development
      ALLOWED_ORIGINS: "http://localhost:5173"
      API_KEY: ""

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    environment:
      VITE_API_PROXY_TARGET: "http://api:8000"
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
