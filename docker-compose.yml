services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas
      POSTGRES_DB: atlas
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

  api:
    build:
      context: ./apps/api
    environment:
      DATABASE_URL: postgresql://atlas:atlas@db:5432/atlas
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
      ALLOWED_ORIGINS: "http://localhost:8088"
      API_KEY: "${ATLAS_API_KEY:-}"
    depends_on:
      - db
      - redis
    ports:
      - "8001:8000"

  worker:
    build:
      context: ./apps/api
    command: arq app.worker.WorkerSettings
    environment:
      DATABASE_URL: postgresql://atlas:atlas@db:5432/atlas
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
    depends_on:
      - db
      - redis

  web:
    build:
      context: ./apps/web
    depends_on:
      - api

volumes:
  pgdata:
