services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas
      POSTGRES_DB: atlas
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ./apps/api
    environment:
      DATABASE_URL: postgresql://atlas:atlas@db:5432/atlas
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
      ALLOWED_ORIGINS: "http://localhost:8080"
      API_KEY: ""
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./apps/api
    command: arq app.worker.WorkerSettings
    environment:
      DATABASE_URL: postgresql://atlas:atlas@db:5432/atlas
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
    depends_on:
      - db
      - redis

  web:
    build:
      context: ./apps/web
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  pgdata:
